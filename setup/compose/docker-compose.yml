version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: conversational-doc-postgres
    environment:
      POSTGRES_DB: conversational_doc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: conversational-doc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data: