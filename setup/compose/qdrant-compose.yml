version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: conversational-doc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    restart: unless-stopped

volumes:
  qdrant_data: